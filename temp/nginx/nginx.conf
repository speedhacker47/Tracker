events {
    worker_connections 1024;
}

http {
    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Next.js API (TrackPro) ────────────────────────────────────────────────
    # Handles all /api/* requests from the Vercel frontend
    server {
        listen 80;
        server_name _;   # Replace with your domain when ready: api.trackpro.com

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;

        # Proxy all traffic to the Next.js container
        location / {
            proxy_pass         http://nextjs:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── HTTPS (uncomment when you have an SSL cert) ───────────────────────────
    # server {
    #     listen 443 ssl;
    #     server_name api.trackpro.yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #
    #     location / {
    #         proxy_pass         http://nextjs:3000;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Upgrade $http_upgrade;
    #         proxy_set_header   Connection 'upgrade';
    #         proxy_set_header   Host $host;
